<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="#222">
    Project Ocean: System Architecture Overview
  </text>
  
  <!-- Background -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0fbf0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Layer 1: Clients (Top) -->
  <g>
    <rect x="450" y="60" width="300" height="60" rx="5" fill="#3498db" opacity="0.9" filter="url(#shadow)"/>
    <text x="600" y="95" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      External Clients / Internet
    </text>
  </g>
  
  <!-- Arrow down -->
  <path d="M 600 120 L 600 160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Layer 2: Load Balancer -->
  <g>
    <rect x="450" y="160" width="300" height="70" rx="5" fill="#9b59b6" opacity="0.9" filter="url(#shadow)"/>
    <text x="600" y="190" font-size="14" font-weight="bold" text-anchor="middle" fill="white">
      Load Balancer
    </text>
    <text x="600" y="215" font-size="12" text-anchor="middle" fill="white">
      (MetalLB / AWS ELB / Azure LB)
    </text>
  </g>
  
  <!-- Arrow down -->
  <path d="M 600 230 L 600 270" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Layer 3: Kubernetes Pods -->
  <g>
    <!-- Pod 1 -->
    <rect x="120" y="270" width="140" height="130" rx="5" fill="url(#blueGrad)" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="295" font-size="13" font-weight="bold" text-anchor="middle" fill="#222">Ocean Pod 1</text>
    <text x="190" y="320" font-size="11" text-anchor="middle" fill="#555">CPU: 500m - 2000m</text>
    <text x="190" y="340" font-size="11" text-anchor="middle" fill="#555">Mem: 256Mi - 512Mi</text>
    <text x="190" y="360" font-size="10" text-anchor="middle" fill="#666">Ready ✓</text>
    <text x="190" y="380" font-size="10" text-anchor="middle" fill="#666">Liveness ✓</text>
    
    <!-- Pod 2 -->
    <rect x="310" y="270" width="140" height="130" rx="5" fill="url(#blueGrad)" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="380" y="295" font-size="13" font-weight="bold" text-anchor="middle" fill="#222">Ocean Pod 2</text>
    <text x="380" y="320" font-size="11" text-anchor="middle" fill="#555">CPU: 500m - 2000m</text>
    <text x="380" y="340" font-size="11" text-anchor="middle" fill="#555">Mem: 256Mi - 512Mi</text>
    <text x="380" y="360" font-size="10" text-anchor="middle" fill="#666">Ready ✓</text>
    <text x="380" y="380" font-size="10" text-anchor="middle" fill="#666">Liveness ✓</text>
    
    <!-- Pod N (scalable) -->
    <rect x="500" y="270" width="140" height="130" rx="5" fill="url(#blueGrad)" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="570" y="295" font-size="13" font-weight="bold" text-anchor="middle" fill="#222">Ocean Pod N</text>
    <text x="570" y="320" font-size="11" text-anchor="middle" fill="#555">CPU: 500m - 2000m</text>
    <text x="570" y="340" font-size="11" text-anchor="middle" fill="#555">Mem: 256Mi - 512Mi</text>
    <text x="570" y="360" font-size="10" text-anchor="middle" fill="#666">Auto-Scaling</text>
    <text x="570" y="380" font-size="10" text-anchor="middle" fill="#666">2-10 replicas</text>
    
    <!-- Plus bracket -->
    <text x="700" y="335" font-size="20" font-weight="bold" fill="#3498db">...</text>
    
    <!-- Right pods -->
    <rect x="780" y="270" width="140" height="130" rx="5" fill="url(#blueGrad)" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="850" y="295" font-size="13" font-weight="bold" text-anchor="middle" fill="#222">Ocean Pod K</text>
    <text x="850" y="320" font-size="11" text-anchor="middle" fill="#555">Metrics Server</text>
    <text x="850" y="340" font-size="11" text-anchor="middle" fill="#555">Integrated</text>
    <text x="850" y="360" font-size="10" text-anchor="middle" fill="#666">CPU/Memory</text>
    <text x="850" y="380" font-size="10" text-anchor="middle" fill="#666">Monitored</text>
  </g>
  
  <!-- Arrows from LB to pods -->
  <path d="M 480 230 L 190 270" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
  <path d="M 590 230 L 380 270" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
  <path d="M 650 230 L 850 270" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
  
  <!-- HPA Controller Box -->
  <rect x="330" y="450" width="280" height="100" rx="5" fill="url(#greenGrad)" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="470" y="475" font-size="14" font-weight="bold" text-anchor="middle" fill="#222">HPA (Horizontal Pod Autoscaler)</text>
  <text x="470" y="500" font-size="11" text-anchor="middle" fill="#555">Monitors: CPU 70% | Memory 80%</text>
  <text x="470" y="520" font-size="11" text-anchor="middle" fill="#555">Scale-Up: Aggressive 15s | Scale-Down: Conservative 300s</text>
  <text x="470" y="540" font-size="11" text-anchor="middle" fill="#555">Min: 2 pods | Max: 10 pods</text>
  
  <!-- Arrows from pods to HPA -->
  <path d="M 190 400 L 380 450" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
  <path d="M 850 400 L 560 450" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
  
  <!-- Arrow down -->
  <path d="M 470 550 L 470 600" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Layer 4: ConfigMap -->
  <rect x="330" y="600" width="280" height="80" rx="5" fill="#f39c12" opacity="0.9" filter="url(#shadow)"/>
  <text x="470" y="625" font-size="13" font-weight="bold" text-anchor="middle" fill="white">ConfigMap: ocean-config</text>
  <text x="470" y="650" font-size="11" text-anchor="middle" fill="white">nginx.conf | modsec.conf | crs-setup.conf</text>
  <text x="470" y="670" font-size="11" text-anchor="middle" fill="white">Injected into all pods (no rebuild)  |  Updates via kubectl edit</text>
  
  <!-- Arrow up to pods -->
  <path d="M 470 600 L 470 400" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
  
  <!-- Legend Box -->
  <g>
    <rect x="50" y="700" width="1100" height="80" rx="5" fill="#ecf0f1" stroke="#34495e" stroke-width="1" filter="url(#shadow)"/>
    <text x="600" y="725" font-size="12" font-weight="bold" text-anchor="middle" fill="#222">Key Components</text>
    
    <!-- Legend items -->
    <circle cx="80" cy="750" r="6" fill="#3498db"/>
    <text x="100" y="755" font-size="11" fill="#222">Pods (2-10 replicas)</text>
    
    <circle cx="340" cy="750" r="6" fill="#9b59b6"/>
    <text x="360" y="755" font-size="11" fill="#222">Load Balancer</text>
    
    <circle cx="620" cy="750" r="6" fill="#27ae60"/>
    <text x="640" y="755" font-size="11" fill="#222">HPA Controller</text>
    
    <circle cx="900" cy="750" r="6" fill="#f39c12"/>
    <text x="920" y="755" font-size="11" fill="#222">ConfigMap (Runtime Configs)</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
</svg>
