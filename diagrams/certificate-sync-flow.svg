<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#222">
    SSL Certificate Distribution & Synchronization
  </text>
  
  <!-- Defs -->
  <defs>
    <linearGradient id="masterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e5f5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="slaveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4c3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe082;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="vaultGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dcedc8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- PHASE 1: Initial Certificate Setup (Top) -->
  <text x="50" y="70" font-size="16" font-weight="bold" fill="#1976d2">Phase 1: Initial Setup</text>
  
  <!-- Certificate generation -->
  <g>
    <rect x="50" y="90" width="200" height="100" rx="5" fill="#fff9c4" stroke="#fbc02d" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="120" font-size="13" font-weight="bold" text-anchor="middle" fill="#222">Generate Certs</text>
    <text x="150" y="145" font-size="11" text-anchor="middle" fill="#555">(OpenSSL or Let's Encrypt)</text>
    <text x="150" y="165" font-size="10" text-anchor="middle" fill="#666">cert.pem + key.pem</text>
  </g>
  
  <!-- Certificate vault -->
  <g>
    <rect x="400" y="90" width="200" height="100" rx="5" fill="url(#vaultGrad)" stroke="#689f38" stroke-width="2" filter="url(#shadow)"/>
    <text x="500" y="120" font-size="13" font-weight="bold" text-anchor="middle" fill="#222">Certificate Store</text>
    <text x="500" y="145" font-size="11" text-anchor="middle" fill="#555">/etc/nginx/certs/</text>
    <text x="500" y="165" font-size="10" text-anchor="middle" fill="#666">public/ private/ archive/</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 250 140 L 400 140" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow1)"/>
  <text x="325" y="130" font-size="11" fill="#1976d2">Copy</text>
  
  <!-- PHASE 2: Initial Distribution (Middle Left) -->
  <text x="50" y="230" font-size="16" font-weight="bold" fill="#1976d2">Phase 2: Distribute to All Nodes</text>
  
  <!-- Primary Node -->
  <g>
    <rect x="50" y="250" width="220" height="120" rx="5" fill="url(#masterGrad)" stroke="#1976d2" stroke-width="3" filter="url(#shadow)"/>
    <rect x="60" y="260" width="200" height="25" rx="3" fill="#1976d2" opacity="0.9"/>
    <text x="160" y="280" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Primary Node-01 (VIP Active)</text>
    
    <text x="70" y="310" font-size="11" fill="#222">✓ ocean.crt (ACTIVE)</text>
    <text x="70" y="330" font-size="11" fill="#222">✓ ocean.key (ACTIVE)</text>
    <text x="70" y="350" font-size="10" fill="#666">Last updated: 2026-04-19 12:00</text>
  </g>
  
  <!-- Secondary Node 2 -->
  <g>
    <rect x="330" y="250" width="220" height="120" rx="5" fill="url(#slaveGrad)" stroke="#f57f17" stroke-width="2" filter="url(#shadow)"/>
    <rect x="340" y="260" width="200" height="25" rx="3" fill="#f57f17" opacity="0.9"/>
    <text x="440" y="280" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Secondary Node-02</text>
    
    <text x="350" y="310" font-size="11" fill="#222">✓ ocean.crt (SYNCED)</text>
    <text x="350" y="330" font-size="11" fill="#222">✓ ocean.key (SYNCED)</text>
    <text x="350" y="350" font-size="10" fill="#666">Last synced: 2026-04-19 12:05</text>
  </g>
  
  <!-- Secondary Node 3 -->
  <g>
    <rect x="610" y="250" width="220" height="120" rx="5" fill="url(#slaveGrad)" stroke="#f57f17" stroke-width="2" filter="url(#shadow)"/>
    <rect x="620" y="260" width="200" height="25" rx="3" fill="#f57f17" opacity="0.9"/>
    <text x="720" y="280" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Secondary Node-03</text>
    
    <text x="630" y="310" font-size="11" fill="#222">✓ ocean.crt (SYNCED)</text>
    <text x="630" y="330" font-size="11" fill="#222">✓ ocean.key (SYNCED)</text>
    <text x="630" y="350" font-size="10" fill="#666">Last synced: 2026-04-19 12:05</text>
  </g>
  
  <!-- Sync Arrows (rsync) -->
  <path d="M 270 310 L 330 310" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="295" y="305" font-size="10" fill="#27ae60" font-weight="bold">rsync SSH</text>
  
  <path d="M 270 330 L 610 330" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="435" y="325" font-size="10" fill="#27ae60" font-weight="bold">rsync SSH</text>
  
  <!-- PHASE 3: Certificate Updates (Middle Right) -->
  <text x="900" y="230" font-size="16" font-weight="bold" fill="#c62828">Phase 3: Update Flow</text>
  
  <!-- Update trigger -->
  <g>
    <circle cx="950" cy="300" r="40" fill="#ff9800" filter="url(#shadow)"/>
    <text x="950" y="305" font-size="13" font-weight="bold" text-anchor="middle" fill="white">New</text>
    <text x="950" y="325" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Cert</text>
  </g>
  
  <!-- Archive old -->
  <g>
    <rect x="900" y="380" width="100" height="70" rx="4" fill="#eceff1" stroke="#78909c" stroke-width="1" filter="url(#shadow)"/>
    <text x="950" y="405" font-size="11" font-weight="bold" text-anchor="middle" fill="#222">Archive Old</text>
    <text x="950" y="425" font-size="9" text-anchor="middle" fill="#555">ocean.crt.20260419-120000</text>
  </g>
  
  <!-- Deploy new -->
  <g>
    <rect x="1050" y="380" width="100" height="70" rx="4" fill="#c8e6c9" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
    <text x="1100" y="405" font-size="11" font-weight="bold" text-anchor="middle" fill="#222">Deploy New</text>
    <text x="1100" y="425" font-size="9" text-anchor="middle" fill="#555">ocean.crt (v2)</text>
  </g>
  
  <!-- Arrows for update flow -->
  <path d="M 950 340 L 950 380" stroke="#c62828" stroke-width="2" marker-end="url(#arrow3)"/>
  <path d="M 1000 415 L 1050 415" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <!-- PHASE 4: Re-Sync to All Nodes (Bottom) -->
  <text x="50" y="520" font-size="16" font-weight="bold" fill="#1976d2">Phase 4: Re-Sync New Certificate to All Nodes</text>
  
  <!-- Primary with new cert -->
  <g>
    <rect x="50" y="540" width="220" height="120" rx="5" fill="url(#masterGrad)" stroke="#1976d2" stroke-width="3" filter="url(#shadow)"/>
    <rect x="60" y="550" width="200" height="25" rx="3" fill="#1976d2" opacity="0.9"/>
    <text x="160" y="570" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Primary Node-01 (VIP Active)</text>
    
    <text x="70" y="600" font-size="11" fill="#222">✓ ocean.crt (v2) ★ NEW</text>
    <text x="70" y="620" font-size="11" fill="#222">✓ ocean.key (v2) ★ NEW</text>
    <text x="70" y="640" font-size="10" fill="#4caf50" font-weight="bold">Updated: 2026-04-19 12:30</text>
  </g>
  
  <!-- Secondary Node 2 - receives sync -->
  <g>
    <rect x="330" y="540" width="220" height="120" rx="5" fill="url(#slaveGrad)" stroke="#f57f17" stroke-width="2" filter="url(#shadow)"/>
    <rect x="340" y="550" width="200" height="25" rx="3" fill="#f57f17" opacity="0.9"/>
    <text x="440" y="570" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Secondary Node-02</text>
    
    <text x="350" y="600" font-size="11" fill="#222">✓ ocean.crt (v2) ★ NEW</text>
    <text x="350" y="620" font-size="11" fill="#222">✓ ocean.key (v2) ★ NEW</text>
    <text x="350" y="640" font-size="10" fill="#4caf50" font-weight="bold">Synced: 2026-04-19 12:35</text>
  </g>
  
  <!-- Secondary Node 3 - receives sync -->
  <g>
    <rect x="610" y="540" width="220" height="120" rx="5" fill="url(#slaveGrad)" stroke="#f57f17" stroke-width="2" filter="url(#shadow)"/>
    <rect x="620" y="550" width="200" height="25" rx="3" fill="#f57f17" opacity="0.9"/>
    <text x="720" y="570" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Secondary Node-03</text>
    
    <text x="630" y="600" font-size="11" fill="#222">✓ ocean.crt (v2) ★ NEW</text>
    <text x="630" y="620" font-size="11" fill="#222">✓ ocean.key (v2) ★ NEW</text>
    <text x="630" y="640" font-size="10" fill="#4caf50" font-weight="bold">Synced: 2026-04-19 12:35</text>
  </g>
  
  <!-- Sync Arrows -->
  <path d="M 270 600 L 330 600" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="295" y="595" font-size="10" fill="#27ae60" font-weight="bold">rsync SSH</text>
  
  <path d="M 270 620 L 610 620" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="435" y="615" font-size="10" fill="#27ae60" font-weight="bold">rsync SSH</text>
  
  <!-- NGINX Reload -->
  <g>
    <rect x="900" y="540" width="220" height="120" rx="5" fill="#e0bee7" stroke="#8e24aa" stroke-width="2" filter="url(#shadow)"/>
    <text x="1010" y="570" font-size="13" font-weight="bold" text-anchor="middle" fill="#222">NGINX Reload</text>
    <text x="1010" y="595" font-size="11" text-anchor="middle" fill="#333">All nodes simultaneously:</text>
    <text x="1010" y="615" font-size="10" text-anchor="middle" fill="#555">systemctl reload nginx</text>
    <text x="1010" y="635" font-size="10" text-anchor="middle" fill="#4caf50" font-weight="bold">Zero downtime ✓</text>
  </g>
  
  <!-- Arrow to reload -->
  <path d="M 830 600 L 900 600" stroke="#8e24aa" stroke-width="2" marker-end="url(#arrow4)"/>
  
  <!-- FAILOVER SAFETY (Bottom) -->
  <text x="50" y="710" font-size="16" font-weight="bold" fill="#1976d2">Failover Safety Mechanism</text>
  
  <!-- Failover scenario boxes -->
  <g>
    <rect x="50" y="730" width="280" height="130" rx="5" fill="#fce4ec" stroke="#c2185b" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="760" font-size="12" font-weight="bold" text-anchor="middle" fill="#222">Node-01 Fails</text>
    <text x="190" y="785" font-size="11" text-anchor="middle" fill="#555">(certificates already synced</text>
    <text x="190" y="805" font-size="11" text-anchor="middle" fill="#555">to Node-02 and Node-03)</text>
    <text x="190" y="825" font-size="10" text-anchor="middle" fill="#c2185b" font-weight="bold">↓</text>
    <text x="190" y="845" font-size="10" text-anchor="middle" fill="#666">Sub-10s fallback to Node-02</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 330 795 L 380 795" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <!-- Safety result -->
  <g>
    <rect x="380" y="730" width="280" height="130" rx="5" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" filter="url(#shadow)"/>
    <text x="520" y="760" font-size="12" font-weight="bold" text-anchor="middle" fill="#222">Node-02 Takes Over</text>
    <text x="520" y="785" font-size="11" text-anchor="middle" fill="#555">(already has NEW certificate)</text>
    <text x="520" y="805" font-size="11" text-anchor="middle" fill="#555">No manual intervention needed</text>
    <text x="520" y="825" font-size="10" text-anchor="middle" fill="#388e3c" font-weight="bold">✓</text>
    <text x="520" y="845" font-size="10" text-anchor="middle" fill="#666">VIP operational immediately</text>
  </g>
  
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976d2" />
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#27ae60" />
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c62828" />
    </marker>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8e24aa" />
    </marker>
  </defs>
</svg>
