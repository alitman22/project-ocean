<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="600" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="#222">
    Bare-Metal Clustering: High Availability Failover
  </text>
  
  <!-- Background gradients and styles -->
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edda;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="standbyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3cd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fffbeb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="failedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8d7da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fce4ec;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- SCENARIO 1: Normal Operation (Left Side) -->
  <text x="300" y="70" font-size="16" font-weight="bold" fill="#22862e">Normal Operation</text>
  
  <!-- Node 1 - Primary (Active) -->
  <g>
    <!-- Main box -->
    <rect x="80" y="100" width="380" height="200" rx="8" fill="url(#primaryGrad)" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- Node name -->
    <rect x="100" y="115" width="340" height="35" rx="4" fill="#27ae60" opacity="0.9"/>
    <text x="270" y="140" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Node 1 (Primary - ACTIVE)</text>
    
    <!-- Components -->
    <text x="110" y="175" font-size="12" font-weight="bold" fill="#222">IP: 192.168.1.100</text>
    <text x="110" y="200" font-size="12" fill="#333">✓ Corosync (running)</text>
    <text x="110" y="225" font-size="12" fill="#333">✓ Pacemaker (running)</text>
    <text x="110" y="250" font-size="12" fill="#333">✓ NGINX (running)</text>
    <text x="110" y="275" font-size="12" font-weight="bold" fill="#27ae60">✓ VIP: 192.168.1.110 (ACTIVE HERE)</text>
  </g>
  
  <!-- Node 2 - Secondary (Standby) -->
  <g>
    <!-- Main box -->
    <rect x="80" y="320" width="380" height="200" rx="8" fill="url(#standbyGrad)" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- Node name -->
    <rect x="100" y="335" width="340" height="35" rx="4" fill="#f39c12" opacity="0.9"/>
    <text x="270" y="360" font-size="14" font-weight="bold" text-anchor="middle" fill="#222">Node 2 (Secondary - STANDBY)</text>
    
    <!-- Components -->
    <text x="110" y="395" font-size="12" font-weight="bold" fill="#222">IP: 192.168.1.101</text>
    <text x="110" y="420" font-size="12" fill="#333">✓ Corosync (running)</text>
    <text x="110" y="445" font-size="12" fill="#333">✓ Pacemaker (running)</text>
    <text x="110" y="470" font-size="12" fill="#333">✓ NGINX (standby mode)</text>
    <text x="110" y="495" font-size="12" fill="#999">○ VIP: not here (waiting)</text>
  </g>
  
  <!-- Network indicators -->
  <text x="500" y="50" font-size="13" font-weight="bold" fill="#555">Cluster Heartbeat</text>
  <path d="M 485 65 Q 550 150 475 240" stroke="#3498db" stroke-width="3" fill="none" marker-end="url(#arrowblue)" stroke-dasharray="5,5"/>
  <path d="M 475 260 Q 550 310 485 395" stroke="#3498db" stroke-width="3" fill="none" marker-end="url(#arrowblue)" stroke-dasharray="5,5"/>
  
  <!-- SCENARIO 2: Failover Event (Right Side) -->
  <text x="900" y="70" font-size="16" font-weight="bold" fill="#d32f2f">Failover Event (5-10 seconds)</text>
  
  <!-- Node 1 - Failed -->
  <g>
    <!-- Main box -->
    <rect x="780" y="100" width="380" height="200" rx="8" fill="url(#failedGrad)" stroke="#d32f2f" stroke-width="2" filter="url(#shadow)" opacity="0.7"/>
    
    <!-- Node name -->
    <rect x="800" y="115" width="340" height="35" rx="4" fill="#d32f2f" opacity="0.9"/>
    <text x="970" y="140" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Node 1 (FAILED / DOWN)</text>
    
    <!-- Components -->
    <text x="810" y="175" font-size="12" font-weight="bold" fill="#222">IP: 192.168.1.100</text>
    <text x="810" y="200" font-size="12" fill="#d32f2f">✗ Corosync (STOPPED)</text>
    <text x="810" y="225" font-size="12" fill="#d32f2f">✗ Pacemaker (STOPPED)</text>
    <text x="810" y="250" font-size="12" fill="#d32f2f">✗ NGINX (STOPPED)</text>
    <text x="810" y="275" font-size="12" fill="#d32f2f">✗ VIP: UNREACHABLE</text>
    
    <!-- Crash indicator -->
    <text x="1050" y="155" font-size="30" font-weight="bold" fill="#d32f2f">!</text>
  </g>
  
  <!-- Node 2 - Now Primary -->
  <g>
    <!-- Main box -->
    <rect x="780" y="320" width="380" height="200" rx="8" fill="url(#primaryGrad)" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- Node name -->
    <rect x="800" y="335" width="340" height="35" rx="4" fill="#27ae60" opacity="0.9"/>
    <text x="970" y="360" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Node 2 (NOW PRIMARY - ACTIVE)</text>
    
    <!-- Components -->
    <text x="810" y="395" font-size="12" font-weight="bold" fill="#222">IP: 192.168.1.101</text>
    <text x="810" y="420" font-size="12" fill="#27ae60">✓ Corosync (running)</text>
    <text x="810" y="445" font-size="12" fill="#27ae60">✓ Pacemaker (running)</text>
    <text x="810" y="470" font-size="12" fill="#27ae60">✓ NGINX (running)</text>
    <text x="810" y="495" font-size="12" font-weight="bold" fill="#27ae60">✓ VIP: 192.168.1.110 (MOVED HERE)</text>
    
    <!-- Success indicator -->
    <text x="1050" y="420" font-size="30" font-weight="bold" fill="#27ae60">✓</text>
  </g>
  
  <!-- Timeline at bottom -->
  <g>
    <rect x="80" y="600" width="1080" height="80" rx="5" fill="#ecf0f1" stroke="#34495e" stroke-width="1" filter="url(#shadow)"/>
    
    <text x="600" y="625" font-size="13" font-weight="bold" text-anchor="middle" fill="#222">Failover Timeline</text>
    
    <!-- Timestamps -->
    <line x1="120" y1="650" x2="120" y2="665" stroke="#333" stroke-width="2"/>
    <text x="120" y="678" font-size="11" text-anchor="middle" fill="#333">T=0s</text>
    <text x="120" y="695" font-size="10" text-anchor="middle" fill="#555">Crash</text>
    
    <line x1="300" y1="650" x2="300" y2="665" stroke="#333" stroke-width="2"/>
    <text x="300" y="678" font-size="11" text-anchor="middle" fill="#333">T=5s</text>
    <text x="300" y="695" font-size="10" text-anchor="middle" fill="#555">Heartbeat Lost</text>
    
    <line x1="480" y1="650" x2="480" y2="665" stroke="#333" stroke-width="2"/>
    <text x="480" y="678" font-size="11" text-anchor="middle" fill="#333">T=7s</text>
    <text x="480" y="695" font-size="10" text-anchor="middle" fill="#555">Failover Triggered</text>
    
    <line x1="660" y1="650" x2="660" y2="665" stroke="#333" stroke-width="2"/>
    <text x="660" y="678" font-size="11" text-anchor="middle" fill="#333">T=9s</text>
    <text x="660" y="695" font-size="10" text-anchor="middle" fill="#555">VIP Migrated</text>
    
    <line x1="840" y1="650" x2="840" y2="665" stroke="#333" stroke-width="2"/>
    <text x="840" y="678" font-size="11" text-anchor="middle" fill="#333">T=10s</text>
    <text x="840" y="695" font-size="10" text-anchor="middle" fill="#555">NGINX Running</text>
    
    <line x1="1020" y1="650" x2="1020" y2="665" stroke="#333" stroke-width="2"/>
    <text x="1020" y="678" font-size="11" text-anchor="middle" fill="#333">T=12s</text>
    <text x="1020" y="695" font-size="10" text-anchor="middle" fill="#555">Connections Resume</text>
    
    <!-- Timeline line -->
    <line x1="120" y1="657" x2="1020" y2="657" stroke="#555" stroke-width="2"/>
  </g>
  
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db" />
    </marker>
  </defs>
</svg>
