#
# ModSecurity OWASP Core Rule Set (CRS) Default Configuration
# Purpose: Enable OWASP CRS v4.x with sensible production defaults
# Based on: OWASP CRS 4.0+ (https://github.com/coreruleset/coreruleset)
#

# ============================================================================
# SECTION 1: ModSecurity ENGINE & AUDIT LOG CONFIGURATION
# ============================================================================

# SecRuleEngine On/Off/DetectionOnly
# On          = Block malicious requests (active protection)
# Off         = Disable ModSecurity entirely
# DetectionOnly = Log threats but allow traffic (recommended for initial deployment)
#
# Production Recommendation:
#   - Week 1-2: DetectionOnly (baseline threats, false positive discovery)
#   - Week 3+: On (after validating no critical false positives)
SecRuleEngine DetectionOnly

# SecAuditEngine On/Off/RelevantOnly
# On           = Log all transactions
# Off          = Disable transaction logging
# RelevantOnly = Log only transactions with rule matches (recommended)
SecAuditEngine RelevantOnly

# SecAuditLogType Serial/Concurrent
# Serial       = Single shared log file (simpler, potential contention)
# Concurrent   = Individual files per transaction (better concurrency)
SecAuditLogType Concurrent

# SecAuditLog: Path to transaction audit log
# Each transaction (request/response pair) logged if matches rule or SecAuditEngine=On
SecAuditLog /var/log/modsecurity/audit.log

# ============================================================================
# SECTION 2: RULE PROCESSING & ANOMALY SCORING
# ============================================================================

# SecDefaultAction
# Default action for rules (applied if rule doesn't specify action)
# "phase:2" = Request processing phase (after headers parsed)
# "log" = Log the match
# "pass" = Continue processing (don't block)
# Together: Log the event, continue to next rule
SecDefaultAction "phase:2,log"

# SecAnomalyScoreThreshold: Inbound threshold
# If total anomaly score >= this, request is flagged/blocked (in On mode)
# OWASP CRS default: 5 (very strict, catch almost all threats)
# Conservative: 10 (higher tolerance for false positives)
# Recommended for production: 5-10 (tune per application baseline)
SecAnomalyScoreThreshold 5

# SecAnomalyScoreThresholdOutbound: Outbound threshold
# If response anomaly score >= this, response is flagged/blocked
# Typically higher than inbound (responses less predictable)
SecAnomalyScoreThresholdOutbound 25

# ============================================================================
# SECTION 3: OWASP CRS RULE CATEGORIES
# ============================================================================
# These ID ranges define the CRS threat categories:
#
# 900000-900999: Initialization & utility
# 901000-901999: Protocol attack rules
# 910000-919999: HTTP attack rules (request body, URI, headers)
# 920000-929999: Protocol attack prevention
# 930000-939999: Application attack - LFI/RFI
# 940000-949999: Application attack - XSS/Injection
# 950000-959999: Application attack - SQLI
# 960000-969999: Copp/Protocol attack & response monitoring
# 970000-979999: Real-time rule monitoring

# ============================================================================
# SECTION 4: RULE LOADING & INCLUDES
# ============================================================================

# Load all OWASP CRS rules (assumes /usr/share/modsecurity-crs/ or similar)
# The following includes all rule files from the CRS package

# Initialization rules (must be first)
Include /usr/share/modsecurity-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf

# Core protection rules
Include /usr/share/modsecurity-crs/rules/REQUEST-901-INITIALIZATION.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-905-COMMON-EXCEPTIONS.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-910-IP-REPUTATION.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-911-METHOD-ENFORCEMENT.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-912-DOS-PROTECTION.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-913-SCANNER-DETECTION.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-920-PROTOCOL-ENFORCEMENT.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-921-PROTOCOL-ATTACK.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-930-APPLICATION-ATTACK-LFI.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-931-APPLICATION-ATTACK-RFI.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-932-APPLICATION-ATTACK-RCE.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-933-APPLICATION-ATTACK-PHP.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-934-APPLICATION-ATTACK-GENERIC.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-941-APPLICATION-ATTACK-XSS.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-942-APPLICATION-ATTACK-SQLI.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-943-APPLICATION-ATTACK-SESSION-FIXATION.conf
Include /usr/share/modsecurity-crs/rules/REQUEST-949-BLOCKING-EVALUATION.conf

# Response/outbound rules
Include /usr/share/modsecurity-crs/rules/RESPONSE-950-DATA-LEAKAGES.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-951-DATA-LEAKAGES-SQL.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-952-DATA-LEAKAGES-JAVA.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-953-DATA-LEAKAGES-PHP.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-954-DATA-LEAKAGES-IIS.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-959-BLOCKING-EVALUATION.conf
Include /usr/share/modsecurity-crs/rules/RESPONSE-980-CORRELATION.conf

# END-OF-RULES marker (cleanup)
SecMarker "END-OF-OWASP-CRS-RULES"

# ============================================================================
# SECTION 5: CUSTOM EXCLUSIONS & TUNING (Per-Application)
# ============================================================================

# SecRuleRemoveById <rule-id>
# Disable specific rule (if causing false positives in your application)
# Syntax: SecRuleRemoveById <id1> <id2> ...
#
# Example: Disable PHP rule 933180 (false positive on custom PHP syntax)
#   SecRuleRemoveById 933180
#
# Find false-positive rule IDs in audit log: grep -o 'id "[0-9]*"' audit.log | sort | uniq -c
#
# Uncomment and customize per your application:
# SecRuleRemoveById 941110 941120  # Too aggressive XSS detection
# SecRuleRemoveById 942440 942450  # SQL injection false positives

# SecRuleRemoveByTag <tag>
# Disable rules by tag (category)
# Syntax: SecRuleRemoveByTag <tag1> <tag2> ...
#
# Common tags: ATTACK, INJECTION, XSS, SQLI, RFI, LFI, SENSITIVE, DOS, etc.
#
# Example: Disable all XSS rules
#   SecRuleRemoveByTag attack-xss
#
# Uncomment and customize:
# SecRuleRemoveByTag attack-xss            # Too aggressive for your app

# SecRule <variable> <operator> <id>
# Custom pre-emptive whitelisting (exclude specific URI/param from rule checks)
#
# Example: Allow /health-check endpoint (often needs unusual params)
#   SecRule REQUEST_URI "@streq /health-check" "id:1000,phase:2,pass,skip:2"
#
# Uncomment and customize per your whitelist needs:
# SecRule REQUEST_URI "@rx ^/api/v1/internal/" "id:1001,phase:2,pass,nolog"

# ============================================================================
# SECTION 6: PERFORMANCE & LOGGING TUNING
# ============================================================================

# SecCollectionTimeout: Timeout for persistent collection data (seconds)
# Default: 3600 (1 hour, reasonable for rate-limiting buckets)
SecCollectionTimeout 3600

# SecRequestBodyAccess: Should ModSecurity buffer & analyze request body
# Default: On (required for POST/PUT body inspection)
# High-throughput: Leave On (small overhead vs. security benefit)
SecRequestBodyAccess On

# SecRequestBodyLimit: Maximum request body size to buffer (bytes)
# Default: 131072 (128KB, reasonable for typical requests)
# High-throughput: Keep reasonable (~1-10MB) to avoid memory exhaustion
SecRequestBodyLimit 10485760  # 10MB

# SecRequestBodyNoAction: Don't block if body exceeds limit, just log
# Default: Off (block if body too large)
# High-throughput: On (let application decide on large uploads)
SecRequestBodyNoAction Off

# SecResponseBodyAccess: Should ModSecurity buffer & analyze response body
# Default: Off (response inspection costly)
# High-throughput: Keep Off unless data leakage protection needed
SecResponseBodyAccess Off

# ============================================================================
# SECTION 7: VARIABLE TRANSFORMATIONS
# ============================================================================

# SecArgumentsLimit: Max arguments to parse
# Default: 1000 (reasonable)
SecArgumentsLimit 1000

# SecServerSignature: Server header visibility (for hiding backend info)
# Default: Shows NGINX/version (information disclosure)
# Production: Set via NGINX config or rewrite (use sed hack in Dockerfile)
# This is handled in the Dockerfile with sed rewrite

# ============================================================================
# SECTION 8: EXCEPTIONS FOR COMMON FALSE POSITIVES
# ============================================================================

# File: REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf  (included above)
# Modify this file to add per-URI or per-parameter exclusions
#
# Common exclusions (add to /usr/share/modsecurity-crs/rules/CUSTOM-EXCLUSIONS.conf):
#
# Exclude healthcheck endpoints from all rules
# SecRule REQUEST_URI "@streq /health" "id:1,phase:1,pass,skip:999"
#
# Exclude internal API endpoints
# SecRule REQUEST_URI "@rx ^/api/internal/" "id:2,phase:1,pass,skip:999"
#
# Exclude file upload parameter from scanner detection
# SecRule ARGS:upload_file "@rx .*" "id:3,phase:1,pass,skip:913"

# ============================================================================
# SECTION 9: GEOLOCATION & RATE LIMITING (Optional)
# ============================================================================

# If using ModSecurity GeoIP extension:
# SecGeoLookupDb /usr/share/GeoIP/GeoIP.dat
# SecRule REMOTE_ADDR "@geoLookup" "id:1000"

# Rate limiting via ModSecurity (experimental):
# Create persistent collections to track request counts
# SecRule REMOTE_ADDR "@pmFromFile /etc/modsecurity/ratelimit-whitelist.txt" \
#     "id:1001,phase:1,pass,nolog,setvar:ratelimit_except=1"

# ============================================================================
# SECTION 10: PRODUCTION DEPLOYMENT CHECKLIST
# ============================================================================
#
# Before enabling SecRuleEngine On:
# 1. Run in DetectionOnly mode for 1-2 weeks
# 2. Monitor audit.log for false positives: grep "Anomaly Score" audit.log | sort | uniq -c
# 3. Add exclusions for confirmed false positives: SecRuleRemoveById <id>
# 4. Adjust SecAnomalyScoreThreshold based on baseline (start at 5, adjust up if too strict)
# 5. Enable outbound rule detection (RESPONSE rules) separately if not needed
# 6. Validate performance: Request latency should increase <5ms per request
# 7. Set up alerting: Monitor audit.log for spike in anomaly scores
# 8. Switch to SecRuleEngine On once validated (1-2 week baseline complete)
#
# Post-Deployment Monitoring:
# - Tail audit.log: tail -f /var/log/modsecurity/audit.log
# - Search blocked requests: grep "The action with id" audit.log | grep -oP 'id "[^"]*"' | sort | uniq -c
# - Alert on anomaly spikes: watch -n 5 'grep "Anomaly Score" /var/log/modsecurity/audit.log | tail -10'
#
