#
# Project Ocean: NGINX Performance Optimization Configuration
# Purpose: High-throughput reverse proxy tuning (>100k req/s)
# Location: Include this snippet in main nginx.conf at http{} block
#

# ============================================================================
# WORKER PROCESS & CONNECTION HANDLING
# ============================================================================

# worker_processes auto
# Automatically set worker processes to match CPU core count
# Default: 1 (severely restrictive)
# High-throughput: auto (one per core, optimal parallelism)
# Each worker process is single-threaded, handles concurrent connections via epoll
worker_processes auto;

# worker_rlimit_nofile 65535
# Maximum file descriptors per worker process
# Default: inherited from system ulimit (often 1024)
# High-throughput: 65535 (supports 64k concurrent connections per worker)
# Total connections = worker_processes * worker_rlimit_nofile
worker_rlimit_nofile 65535;

# ============================================================================
# CONNECTION THROTTLING & BACKLOG
# ============================================================================

events {
    # worker_connections 20480
    # Maximum concurrent connections per worker process
    # Default: 512 (very low)
    # High-throughput: 20480 (20k conns per worker, 160k total on 8 cores)
    # Formula: worker_processes * worker_connections = total concurrency
    worker_connections 20480;

    # use epoll (implicit on Linux, best for high I/O concurrency)
    # Kernel multiplexing: epoll > select > poll (epoll is O(1), scales to 10k+ fds)
    use epoll;

    # multi_accept on
    # Accept multiple new connections per epoll cycle (batching)
    # Default: off (accept 1 connection per cycle, inefficient)
    # High-throughput: on (accept all ready connections in one syscall)
    multi_accept on;
}

# ============================================================================
# TCP/HTTP CORE OPTIMIZATIONS
# ============================================================================

# sendfile on
# Use kernel sendfile() syscall instead of read()+write()
# Default: off (userspace copy overhead)
# High-throughput: on (zero-copy, kernel handles TX directly)
# Requirement: Must be off if using gzip/ssl_session_cache (need userspace processing)
sendfile on;

# tcp_nopush on
# Coalesce small packets into larger TCP segments (reduce syscalls)
# Effective only when sendfile=on
# Default: off (sends small packets immediately, increases overhead)
# High-throughput: on (batches packets into full MTU, 5-15% throughput gain)
tcp_nopush on;

# tcp_nodelay on
# Disable Nagle's algorithm (send small packets immediately, not delayed)
# Default: off (Nagle enabled, 40ms+ latency for small HTTP headers)
# High-throughput: on (low-latency, send headers without waiting for data)
# Note: tcp_nopush=on + tcp_nodelay=on create optimal buffer behavior
tcp_nodelay on;

# ============================================================================
# KEEPALIVE & PERSISTENCE
# ============================================================================

# keepalive_timeout 65
# How long to keep idle HTTP persistent connections open (seconds)
# Default: 75 (wastes resources on idle connections)
# High-throughput: 65 (balances resource reuse with cleanup speed)
keepalive_timeout 65;

# keepalive_requests 1000
# Maximum requests per HTTP persistent connection before closing
# Default: 100 (causes unnecessary connection churn)
# High-throughput: 1000 (reuses connection longer, reduces 3WHS overhead)
keepalive_requests 1000;

# ============================================================================
# BUFFER & CACHING OPTIMIZATION
# ============================================================================

# client_body_buffer_size 128K
# Buffer size for client request body (before writing to disk)
# Default: 8K (causes disk writes for large POSTs, slow)
# High-throughput: 128K (most request bodies fit in memory, reduces I/O)
client_body_buffer_size 128K;

# client_max_body_size 10M
# Maximum allowed client request body size
# Default: 1M (restrictive for file uploads)
# High-throughput: 10M (adjust per application needs)
client_max_body_size 10M;

# Gzip compression (selective, costs CPU but saves bandwidth)
# gzip on;
# gzip_vary on;
# gzip_proxied any;
# gzip_comp_level 6;
# gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
# Note: Disable gzip if throughput > bandwidth becomes bottleneck (CPU matters more than bandwidth)

# ============================================================================
# FILE DESCRIPTOR & CACHING
# ============================================================================

# open_file_cache max=200000 inactive=20s
# Cache file descriptor / metadata lookups (stat() syscalls)
# Default: off (every static file access does stat syscall, expensive)
# High-throughput: max=200k (cache 200k file descriptors), inactive=20s (TTL)
# Saves ~microseconds per request for static content serving
open_file_cache max=200000 inactive=20s;

# open_file_cache_valid 30s
# Revalidate cached file metadata after 30 seconds (catch file deletions/updates)
# Default: 60s
open_file_cache_valid 30s;

# open_file_cache_min_uses 2
# Minimum hit count before caching a file (reduce cache pollution)
# Default: 1 (cache everything, can waste memory on rarely-used files)
# High-throughput: 2 (only cache if accessed 2+ times)
open_file_cache_min_uses 2;

# ============================================================================
# UPSTREAM CONNECTION POOLING (for reverse proxying)
# ============================================================================

# keepalive 32
# Connection pool size to upstream servers (persistent backend connections)
# Default: 0 (no pooling, overhead of TCP 3WHS to backend per request)
# High-throughput: 32 (keep 32 persistent connections to backend pool, <1ms backend latency)
# Add this inside upstream{} blocks:
#
#   upstream backend {
#       server 10.0.0.1:8080 max_fails=3 fail_timeout=30s;
#       server 10.0.0.2:8080 max_fails=3 fail_timeout=30s;
#       keepalive 32;
#       keepalive_requests 100;
#       keepalive_timeout 60;
#   }

# ============================================================================
# PROXY HEADERS & BUFFERING (if used as reverse proxy)
# ============================================================================

# proxy_connect_timeout 60s
# Upstream connection establish timeout (default: 60s)
proxy_connect_timeout 60s;

# proxy_send_timeout 60s
# Upstream request send timeout (default: 60s)
proxy_send_timeout 60s;

# proxy_read_timeout 60s
# Upstream response read timeout (default: 60s)
proxy_read_timeout 60s;

# proxy_buffer_size 4K
# Initial buffer for upstream response headers (default: 4K)
proxy_buffer_size 4K;

# proxy_buffers 8 4K
# Additional buffers for upstream response body (8 buffers, 4K each = 32K total)
# Default: 8 4K (reasonable for typical HTTP responses)
proxy_buffers 8 4K;

# proxy_busy_buffers_size 8K
# Threshold for writing buffered data to client (bytes)
# Default: 8K (start writing when 8K buffered)
proxy_busy_buffers_size 8K;

# ============================================================================
# LOGGING (Minimize overhead)
# ============================================================================

# Disable unnecessary logging in production (logging = I/O overhead)
# access_log off;  # If not needed, disable access logging
# Or redirect to syslog instead of disk for faster async I/O

# error_log /var/log/nginx/error.log warn;  # Reduce error log verbosity (warn only)

# ============================================================================
# RESOLVER (for dynamic upstream resolution)
# ============================================================================

# resolver 8.8.8.8 8.8.4.4 valid=300s;
# DNS resolver for dynamic upstream hostnames (if using variables in upstream addresses)
# Default: not configured (uses /etc/resolv.conf)
# High-throughput: Google DNS 8.8.8.8 with 300s TTL (balances freshness vs caching)

# ============================================================================
# TIMEOUTS & LIMITS
# ============================================================================

# client_header_timeout 12s
# Timeout waiting for client HTTP request headers (default: 60s)
# High-throughput: 12s (catch slow clients quickly, free up worker)
client_header_timeout 12s;

# client_body_timeout 12s
# Timeout waiting for client HTTP request body (default: 60s)
# High-throughput: 12s (similar reason)
client_body_timeout 12s;

# send_timeout 10s
# Timeout for sending response to client (default: 60s)
# High-throughput: 10s (don't hold worker on slow clients)
send_timeout 10s;

# ============================================================================
# SSL/TLS OPTIMIZATION (if terminating SSL)
# ============================================================================

# ssl_protocols TLSv1.2 TLSv1.3;
# Supported TLS versions (disable older versions for security + speed)

# ssl_ciphers HIGH:!aNULL:!MD5;
# Cipher suite (prefer ECDHE for PFS, AES for speed)

# ssl_session_cache shared:SSL:50m;
# Session cache: shared RAM, 50MB (avoids 3WHS overhead on resumption)

# ssl_session_timeout 1d;
# Session validity duration (1 day = reasonable)

# ssl_session_tickets off;
# Disable session tickets (avoid encryption overhead on client-side cache)

# ============================================================================
# PERFORMANCE SUMMARY
# ============================================================================
#
# Expected Gains with This Configuration:
#
# 1. Connection Throughput: 10x-100x faster via multi_accept, large worker_connections
# 2. Latency: <10ms p99 (keepalive_requests, persistent upstream pools, tcp_nodelay)
# 3. CPU Efficiency: 30-50% lower CPU (sendfile, tcp_nopush, cached file descriptors)
# 4. Memory Efficiency: ~2-4MB per worker (reasonable trade-off vs throughput)
# 5. Scalability: Linear to core count (worker_processes auto)
#
# Baseline Assumptions:
#   - CPU: Modern Intel/AMD (Xeon, EPYC) with 8+ cores
#   - Memory: 16GB+ (to support 200k open file cache + buffers)
#   - Network: 10Gbps+ interface with modern NIC driver
#   - Backend: Applicationservers with sub-100ms response times
#
