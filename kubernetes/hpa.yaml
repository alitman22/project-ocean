apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ocean-hpa
  namespace: default
  labels:
    app: ocean
    tier: autoscaler
spec:
  # ========================================================================
  # SCALING TARGET
  # ========================================================================
  # Target the "ocean" Deployment for scaling
  
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ocean
  
  # ========================================================================
  # REPLICA BOUNDS
  # ========================================================================
  # Minimum: 2 pods (ensure high availability, load balance across nodes)
  # Maximum: 10 pods (prevent resource exhaustion / uncontrolled scaling)
  
  minReplicas: 2
  maxReplicas: 10
  
  # ========================================================================
  # METRICS FOR SCALING DECISIONS
  # ========================================================================
  # HPA uses these metrics to determine if scaling is needed
  # Both must be configured (AND logic: if ANY metric triggers, scale is performed)
  
  metrics:
    # METRIC 1: CPU Utilization (as % of requested CPU)
    - type: Resource
      resource:
        name: cpu
        target:
          # targetAverageUtilization: Scale up if avg pod CPU > 70% of request (500m)
          # Calculation: If pod uses >350m CPU (70% of 500m), scale up
          # Why 70%? Leaves headroom for traffic bursts without thrashing
          # Why request-based? Scheduler reserves CPU per request, not node max
          type: Utilization
          averageUtilization: 70
    
    # METRIC 2: Memory Utilization (as % of requested memory)
    - type: Resource
      resource:
        name: memory
        target:
          # targetAverageUtilization: Scale up if avg pod memory > 80% of request (256Mi)
          # Calculation: If pod uses >205Mi (80% of 256Mi), scale up
          # Why 80%? Memory is less bursty than CPU, higher threshold reasonable
          # If memory exhausted -> OOMKill -> pod restart, so be conservative
          type: Utilization
          averageUtilization: 80
  
  # ========================================================================
  # SCALING BEHAVIOR (Advanced)
  # ========================================================================
  # Defines how quickly HPA scales up/down (prevents flapping)
  
  behavior:
    # Scaling Up: When metrics exceed thresholds
    scaleUp:
      stabilizationWindowSeconds: 15  # Wait 15s after scale-up before next scale-up
      policies:
        # Policy 1: Scale up by 50%
        - type: Percent
          value: 50
          periodSeconds: 15
        # Policy 2: Add 2 pods max per scale-up event
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max  # Use policy that gives MOST replicas (aggressive scale-up on spikes)
    
    # Scaling Down: When metrics drop below thresholds
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes after scale-down before next scale-down
      policies:
        # Policy 1: Remove 1 pod per scale-down event (conservative, avoid flapping)
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min  # Use policy that scales DOWN least aggressively

---
# HorizontalPodAutoscaler (HPA) Detailed Behavior:
#
# Prerequisites:
#   1. Metrics Server must be installed: kubectl get deployment metrics-server -n kube-system
#      If not: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#   2. Pod resource requests must be set (Deployment.spec.containers[].resources.requests)
#      HPA calculates utilization as: (actual usage / requested) * 100%
#
# Scaling Trigger Workflow:
#   1. Metrics Server collects metrics every 30 seconds from kubelet
#   2. HPA queries Metrics API every 15 seconds (--horizontal-pod-autoscaler-sync-period)
#   3. If metric exceeds threshold for stabilization window:
#      - CPU > 70% or Memory > 80% -> Consider scaling UP
#   4. If metric below threshold for stabilization window:
#      - CPU < 70% and Memory < 80% for 5 minutes -> Scale DOWN
#   5. Apply scaling policies:
#      - Scale UP: Add up to 2 pods (or 50%, whichever is more)
#      - Scale DOWN: Remove 1 pod per minute (conservative)
#
# Example Scenario 1: Traffic Spike
#   Time 0:00    CPU 45%, Memory 60% (2 pods)
#   Time 0:05    CPU 72%, Memory 75% (threshold exceeded)
#   Time 0:15    CPU 75%, Memory 77% (still high, stabilization window complete)
#   Action:      Scale up by 2 pods (Max[50%, 2 pods] = 2 pods)
#   Time 0:30    Total 4 pods now serving traffic
#   Time 0:45    CPU 65%, Memory 70% (back below threshold)
#   Time 5:45    CPU 65%, Memory 70% (stable for 5 minutes, now eligible for scale-down)
#   Action:      Scale down by 1 pod
#   Final:       3 pods (conservative, re-evaluate every minute)
#
# Example Scenario 2: Sustained High Load
#   Time 0:00    CPU 45%, Memory 60% (2 pods)
#   Time 0:15    CPU 75%, Memory 78% (scale up to 4 pods)
#   Time 0:45    CPU 72%, Memory 76% (still high, scale up to 6 pods)
#   Time 1:15    CPU 71%, Memory 77% (still high, scale up to 8 pods)
#   Time 1:45    CPU 68%, Memory 75% (approaching threshold, add 2 more -> 10 pods)
#   Time 2:00    CPU 65%, Memory 72% (high but not triggered after stabilization window)
#   Time 7:00    CPU 45%, Memory 55% (load dropped, eligible for scale-down)
#   Time 7:01    Scale down by 1 pod
#   Time 8:01    Scale down by 1 pod (repeat every minute)
#   Final:       Gradually return to 2 pods
#
# Why These Values?
#   minReplicas: 2
#     - Single pod would be single point of failure (no HA)
#     - 2 pods can sustain node failures (even if N-1 pod survives)
#   
#   maxReplicas: 10
#     - Most applications don't benefit from >10 instances
#     - 10 pods * 500m CPU = 5 cores max utilization (reasonable for modern cluster)
#     - 10 pods * 256Mi memory = 2.56GB max (reasonable)
#     - Prevents runaway scaling in case of metrics anomalies
#   
#   CPU threshold: 70%
#     - Allows 30% headroom for bursty traffic without thrashing
#     - If 100%, already hitting limits (too reactive)
#     - If 50%, scaling too aggressively (cost inefficient)
#   
#   Memory threshold: 80%
#     - Memory is less bursty than CPU
#     - Higher threshold reasonable (memory more predictable)
#     - Prevents OOMKill: if > 80% of 256Mi limit = 205Mi, room to grow
#   
#   scaleUp stabilization: 15 seconds
#     - Aggressive: respond quickly to spikes
#     - 15 seconds allows cascading scale-up (each event adds more pods)
#   
#   scaleDown stabilization: 300 seconds (5 minutes)
#     - Conservative: avoid thrashing (scale down then up again)
#     - 5 minutes ensures load is genuinely lower, not temporary dip
#     - Remove 1 pod per minute: gentle, controlled disengagement
#
# Monitoring HPA Status:
#   kubectl describe hpa ocean-hpa              # See current metrics & scaling activity
#   kubectl get hpa ocean-hpa -w                # Watch real-time scaling events
#   kubectl top pods -l app=ocean               # Show actual CPU/memory usage per pod
#   kubectl logs -l app=ocean -f                # Check for errors during scale events
#
# Debugging Common Issues:
#
#   Issue: HPA shows "unknown" for metrics
#   Cause: Metrics Server not installed or pod requests not defined
#   Fix: 1) Install metrics-server, 2) Add .resources.requests to Deployment
#
#   Issue: HPA not scaling despite high CPU
#   Cause: Metric threshold calculation based on REQUESTS, not limits
#   Fix: Increase .resources.requests to realistic value (500m used in this config)
#
#   Issue: Rapid scale up/down cycling (thrashing)
#   Cause: Metrics hovering near threshold
#   Fix: Increase stabilization windows (scaleUp: 30s+, scaleDown: 600s+)
#
#   Issue: Scaling takes too long to respond
#   Cause: Metrics Server lag + HPA sync period
#   Fix: Reduce stabilization windows, but risk thrashing
#        Usually 15s scale-up + 30s metrics = ~45s total response time (acceptable)
#
# Production Recommendations:
#
#   1. Start with these values (minReplicas: 2, maxReplicas: 10)
#   2. Monitor scaling behavior for 1-2 weeks
#   3. Adjust based on patterns:
#      - If scaling too slow: lower CPU/memory thresholds (e.g., 60%/70%)
#      - If scaling too fast/thrashing: raise thresholds (e.g., 80%/90%)
#      - If scale-down too aggressive: increase stabilization window (300s -> 600s)
#   4. Set up alerting on HPA events: watch for max replicas constantly hit
#   5. Use custom metrics for business-relevant scaling (e.g., requests/sec)
#      - Requires custom metrics API (Prometheus adapter)
#      - More predictive than CPU/memory percentages
